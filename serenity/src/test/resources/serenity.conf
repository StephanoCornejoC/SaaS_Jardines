####################################################
# SERENITY BDD CONFIGURATION - SAAS COREM
# Docs: https://serenity-bdd.github.io/docs/guide/serenity_configuration
####################################################

serenity {

  # Nombre del proyecto en los reportes
  project.name = "SAAS COREM - E2E Tests"

  # Directorio de resultados
  outputDirectory = target/site/serenity

  # Requisitos y feature files
  requirements {
    root = features
  }

  # Historial de tests para tendencias en reportes
  maintain.session.at.step.level = true

  # Screenshots: AFTER_EACH_STEP | FOR_FAILURES | DISABLED
  take.screenshots = FOR_FAILURES

  # Videos: deshabilitado por defecto (habilitar en CI si se necesita)
  record.videos = false

  # Espera por defecto entre acciones (ms)
  step.delay = 0

  # Tag usado en reportes
  tag.transformer = net.serenitybdd.core.tags.BreadcrumbTagTransformer
}

####################################################
# WEBDRIVER CONFIGURATION
####################################################
webdriver {
  # Browser: chrome | firefox | edge | safari
  driver = chrome

  # URL base del frontend React
  base.url = "http://localhost:3000"

  # Timeout de carga de pagina (ms)
  timeouts {
    implicitly.wait = 0
    flight.compensation = 5000
    wait.for.element = 10000
    wait.for.angular = 10000
    script.timeout = 30000
    page.load.timeout = 30000
  }

  chrome {
    # Opciones para Chrome
    preferences {
      download.default_directory = "${user.dir}/target/downloads"
      download.prompt_for_download = false
      plugins.always_open_pdf_externally = true
    }
    switches = "--lang=es,--disable-extensions,--no-sandbox,--disable-dev-shm-usage,--window-size=1920,1080"
  }

  firefox {
    preferences {
      browser.download.folderList = 2
      browser.download.dir = "${user.dir}/target/downloads"
    }
  }
}

####################################################
# ENVIRONMENTS
####################################################
environments {

  default {
    webdriver.base.url = "http://localhost:3000"
    api.base.url = "http://localhost:8000"
    api.version = "/api/v1"
    test.tenant.host = "test.localhost"
    test.email = "admin@test.com"
    test.password = "TestPass1234"
  }

  local {
    webdriver.base.url = "http://localhost:3000"
    api.base.url = "http://localhost:8000"
    api.version = "/api/v1"
    test.tenant.host = "test.localhost"
    test.email = "admin@test.com"
    test.password = "TestPass1234"
    headless = false
  }

  ci {
    webdriver.base.url = "http://localhost:3000"
    api.base.url = "http://localhost:8000"
    api.version = "/api/v1"
    test.tenant.host = "test.localhost"
    test.email = "admin@test.com"
    test.password = "TestPass1234"
    headless = true
    # En CI usar un solo worker para estabilidad
    serenity.batch.size = 1
  }

}

####################################################
# REST-ASSURED (API setup de datos)
####################################################
restassured {
  base.uri = "http://localhost:8000"
}

####################################################
# REPORTE SERENITY
####################################################
report {
  # Incluir screenshots en el reporte HTML
  show.step.details = true
  # Titulo del reporte
  title = "SAAS COREM - Living Documentation"
}
